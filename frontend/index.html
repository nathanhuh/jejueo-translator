<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jejueo Translator Mock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <div class="brand-wrap">
          <h1 class="brand">Jejueo<br />Translator</h1>
          <svg class="totem" viewBox="0 0 64 88" aria-hidden="true">
            <rect x="20" y="14" width="24" height="56" rx="11" />
            <circle cx="32" cy="18" r="11" />
            <circle cx="26" cy="17" r="1.8" fill="#f2f2f2" />
            <circle cx="38" cy="17" r="1.8" fill="#f2f2f2" />
            <rect x="19" y="68" width="26" height="9" rx="4" />
            <rect x="11" y="73" width="41" height="9" rx="4" />
          </svg>
        </div>

        <nav>
          <ul class="menu">
            <li>Research</li>
            <li>Safety</li>
            <li>For Business</li>
            <li>For Developers</li>
            <li>ChatGPT</li>
            <li>Sora</li>
            <li>Codex</li>
            <li>Stories</li>
            <li>Company</li>
            <li>News</li>
          </ul>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <button class="icon" aria-label="Search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6.5" />
              <line x1="15.5" y1="15.5" x2="20" y2="20" />
            </svg>
          </button>
          <button class="icon" aria-label="Account menu">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="4.2" />
              <path d="M4.5 20.2c1.7-4.2 4.2-5.6 7.5-5.6s5.8 1.4 7.5 5.6" />
            </svg>
          </button>
          <button class="icon avatar" aria-label="Profile"></button>
        </header>

        <section class="hero">
          <h2>Explore with Jejueo’s heart.</h2>
          <p>What can I help with?</p>

          <div class="prompt" role="textbox" aria-label="Translator prompt" tabindex="0">
            <span>Explica por qué el maíz palomitas explota</span>
            <button class="send" aria-label="Send">↑</button>
          </div>

          <div class="chips">
            <div class="chip-row">
              <button>Learn about jeu-do</button>
              <button>Check with a Local</button>
            </div>
            <div class="chip-row">
              <button>Speak with an Elder</button>
              <button>Jejueo Dictionary</button>
              <button>More Jeju</button>
            </div>
          </div>
        </section>

        <div class="sparkle" aria-hidden="true">✦</div>
      </main>
    </div>
  </body>
</html>

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "jejueo-shared"
version = "0.1.0"
description = "Shared API contract and validation helpers for the Jejueo translator MVP"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.12.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
